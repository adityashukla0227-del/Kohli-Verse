<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KohliVerse</title>

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav h2{
  color:#E53935;
  opacity:0;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:120px 50px 50px;
}

.hero h1{
  font-size:70px;
  color:#E53935;
}

.hero p{
  color:#bbb;
  max-width:400px;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#E53935;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #E53935;
}

.hero img{
  width:320px;
  border-radius:15px;
  box-shadow:0 0 30px #E53935;
}

/* SECTION */
.section{
  padding:80px 50px;
}

.section h2{
  color:#E53935;
  margin-bottom:30px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 30px rgba(229,57,53,0.4);
}

.card h3{
  color:#E53935;
  font-size:28px;
}

/* TIMELINE */
.timeline{
  border-left:2px solid #E53935;
  padding-left:20px;
}

.event{
  margin-bottom:15px;
  color:#ccc;
  opacity:0;
  transform:translateX(-30px);
  transition:0.5s;
}

.event span{
  color:#E53935;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#666;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero h1{
    font-size:45px;
  }
}
</style>

</head>

<body>

<!-- CANVAS -->
<canvas id="bg"></canvas>

<!-- NAV -->
<nav>
  <h2>KohliVerse</h2>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1 id="title">KohliVerse</h1>
    <p id="subtitle">The Legacy of Passion, Power & Performance</p>
    <button class="btn">Explore</button>
  </div>

  <img src="https://i.imgur.com/3ZQ3ZQF.png">
</div>

<!-- STATS -->
<div class="section" data-aos="fade-up">
  <h2>Records Dashboard</h2>

  <div class="grid">
    <div class="card" data-aos="zoom-in">
      <h3>27000+</h3>
      <p>Runs</p>
    </div>

    <div class="card" data-aos="zoom-in" data-aos-delay="100">
      <h3>80+</h3>
      <p>Centuries</p>
    </div>

    <div class="card" data-aos="zoom-in" data-aos-delay="200">
      <h3>500+</h3>
      <p>Matches</p>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div class="section" data-aos="fade-up">
  <h2>Career Timeline</h2>

  <div class="timeline">
    <div class="event"><span>2008</span> ODI Debut 🏏</div>
    <div class="event"><span>2011</span> World Cup 🏆</div>
    <div class="event"><span>2016</span> Peak Form 🔥</div>
    <div class="event"><span>2018</span> ICC Awards 👑</div>
  </div>
</div>

<footer>
Made with ❤️ by Aditya | KohliVerse
</footer>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();

/* GSAP INTRO */
gsap.from("#title", {
  y: 50,
  opacity: 0,
  duration: 1
});

gsap.from("#subtitle", {
  y: 30,
  opacity: 0,
  delay: 0.3
});

gsap.from("nav h2", {
  opacity: 0,
  duration: 1
});

/* CANVAS PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.6,
    dy:(Math.random()-0.5)*0.6
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#E53935";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });

  requestAnimationFrame(animate);
}

animate();

/* TRIGGER TIMELINE ANIMATION */
window.addEventListener("scroll",()=>{
  document.querySelectorAll(".event").forEach(el=>{
    const top=el.getBoundingClientRect().top;
    if(top<window.innerHeight-100){
      el.style.opacity=1;
      el.style.transform="translateX(0)";
    }
  });
});
</script>

</body>
</html>
