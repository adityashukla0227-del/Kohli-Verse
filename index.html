<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KohliVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
}

/* CANVAS BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100vh;
  background:#0a0a0a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner{
  width:60px;
  height:60px;
  border:4px solid #222;
  border-top:4px solid #E53935;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

#loader h1{
  margin-top:20px;
  color:#E53935;
}

/* CONTENT */
#content{
  opacity:0;
  transition:1s ease;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  z-index:100;
}

nav h2{
  color:#E53935;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:100px 50px 50px;
}

.hero h1{
  font-size:70px;
  color:#E53935;
}

.hero p{
  color:#bbb;
  max-width:400px;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#E53935;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.hero img{
  width:320px;
  border-radius:15px;
  box-shadow:0 0 30px #E53935;
}

/* SECTION */
.section{
  padding:80px 50px;
}

.section h2{
  color:#E53935;
  margin-bottom:30px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 25px rgba(229,57,53,0.4);
}

.card h3{
  color:#E53935;
  font-size:28px;
}

/* TIMELINE */
.timeline{
  border-left:2px solid #E53935;
  padding-left:20px;
}

.event{
  margin-bottom:15px;
  color:#ccc;
}

.event span{
  color:#E53935;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#666;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero h1{
    font-size:45px;
  }
}
</style>

</head>

<body>

<!-- 🌌 PARTICLE CANVAS -->
<canvas id="bg"></canvas>

<!-- 🔥 LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <h1>KohliVerse Loading...</h1>
</div>

<!-- CONTENT -->
<div id="content">

<!-- NAV -->
<nav>
  <h2>KohliVerse</h2>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>KohliVerse</h1>
    <p>The Legacy of Passion, Power & Performance</p>
    <button class="btn">Explore</button>
  </div>

  <img src="https://i.imgur.com/3ZQ3ZQF.png">
</div>

<!-- STATS -->
<div class="section">
  <h2>Records Dashboard</h2>

  <div class="grid">
    <div class="card">
      <h3 class="counter" data-target="27000">0</h3>
      <p>Runs</p>
    </div>

    <div class="card">
      <h3 class="counter" data-target="80">0</h3>
      <p>Centuries</p>
    </div>

    <div class="card">
      <h3 class="counter" data-target="500">0</h3>
      <p>Matches</p>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div class="section">
  <h2>Career Timeline</h2>

  <div class="timeline">
    <div class="event"><span>2008</span> ODI Debut 🏏</div>
    <div class="event"><span>2011</span> World Cup 🏆</div>
    <div class="event"><span>2016</span> Peak Form 🔥</div>
    <div class="event"><span>2018</span> ICC Awards 👑</div>
  </div>
</div>

<footer>
Made with ❤️ by Aditya | KohliVerse
</footer>

</div>

<script>
// LOADER
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("content").style.opacity="1";
  },1200);
};

// COUNTERS
document.querySelectorAll(".counter").forEach(c=>{
  let update=()=>{
    let t=+c.getAttribute("data-target");
    let v=+c.innerText;
    let inc=t/80;
    if(v<t){
      c.innerText=Math.ceil(v+inc);
      setTimeout(update,20);
    } else c.innerText=t;
  }
  update();
});

// 🌌 PARTICLE BACKGROUND
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#E53935";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
